name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        python: ["3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --all-packages --all-extras
      - run: uv run ruff check packages/
      - run: uv run --directory packages/core pytest tests/ -q --cov=agentassert_typec_core --cov-fail-under=100
      - run: uv run --directory packages/proxy pytest tests/ -q
      - run: uv run --directory packages/sdk pytest tests/ -q
      - run: uv run --directory packages/claude-code pytest tests/ -q
