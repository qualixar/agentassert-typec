name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        python: ["3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --group dev
      - run: uv run ruff check packages/
      - run: uv run pytest packages/core/tests/ -q --cov=agentassert_typec_core --cov-fail-under=100
      - run: uv run pytest packages/proxy/tests/ packages/sdk/tests/ packages/claude-code/tests/ -q
