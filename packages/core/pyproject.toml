[project]
name = "agentassert-typec-core"
version = "0.6.0"
description = "AgentAssert Type-C kernel — formal behavioral contracts for AI agent harnesses. Provider-blind, transport-blind runtime enforcement."
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
authors = [{ name = "Varun Pratap Bhardwaj" }]
keywords = [
    "ai-agents", "behavioral-contracts", "runtime-enforcement",
    "drift-detection", "agent-safety", "formal-specification",
    "agentassert", "typec", "qualixar",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "pydantic>=2.10,<3",
    "numpy>=2.0",
    "scipy>=1.14",
    "ruamel-yaml>=0.18",
    "simpleeval>=1.0",
    "opentelemetry-api>=1.42.1",
    "opentelemetry-sdk>=1.42.1",
]

[project.optional-dependencies]
otel = ["opentelemetry-api>=1.28", "opentelemetry-sdk>=1.28", "opentelemetry-exporter-otlp-proto-grpc>=1.28"]
dev = [
    "pytest>=8.0",
    "pytest-cov>=6.0",
    "pytest-asyncio>=0.24",
    "hypothesis>=6.100",
    "ruff>=0.9",
    "basedpyright>=1.20",
    "opentelemetry-api>=1.28",
    "opentelemetry-sdk>=1.28",
]

[project.urls]
Homepage = "https://agentassert.com/typec"
Paper = "https://arxiv.org/abs/2602.22302"
Repository = "https://github.com/qualixar/agentassert-typec"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentassert_typec_core"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py312"
line-length = 99

[tool.basedpyright]
typeCheckingMode = "standard"
pythonVersion = "3.12"
