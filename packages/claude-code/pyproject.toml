[project]
name = "agentassert-typec-claude-code"
version = "0.6.2"
description = "AgentAssert Type-C Claude Code hook adapter — enforce behavioral contracts directly in Claude Code CLI."
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
authors = [{ name = "Varun Pratap Bhardwaj" }]
keywords = [
    "ai-agents", "behavioral-contracts", "claude-code",
    "hook", "agentassert", "typec", "qualixar",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "agentassert-typec-core>=0.6.2,<0.7",
    "click>=8.1",
]

[project.upload]
name = "agentassert-typec-claude-code"

[project.scripts]
agentassert-claude-code = "agentassert_typec_claude_code.cli:cli"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=6.0",
    "ruff>=0.9",
]

[project.urls]
Homepage = "https://agentassert.com/typec"
Paper = "https://arxiv.org/abs/2602.22302"
Repository = "https://github.com/qualixar/agentassert-typec"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentassert_typec_claude_code"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py312"
line-length = 99
