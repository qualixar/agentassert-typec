[project]
name = "agentassert-typec-proxy"
version = "0.4.3"
description = "AgentAssert Type-C HTTP forwarding proxy — formal behavioral contracts middleware for any AI agent, any provider."
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
authors = [{ name = "Varun Pratap Bhardwaj" }]
keywords = [
    "ai-agents", "behavioral-contracts", "runtime-enforcement",
    "proxy", "middleware", "agentassert", "typec", "qualixar",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.12",
    "Topic :: Internet :: WWW/HTTP :: HTTP Servers",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "agentassert-typec-core>=0.4.2,<0.5",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "httpx>=0.28",
    "orjson>=3.10",
    "click>=8.1",
]

[project.scripts]
agentassert-proxy = "agentassert_typec_proxy.cli:cli"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=6.0",
    "pytest-asyncio>=0.24",
    "httpx>=0.28",
    "ruff>=0.9",
]

[project.urls]
Homepage = "https://agentassert.com/typec"
Paper = "https://arxiv.org/abs/2602.22302"
Repository = "https://github.com/qualixar/agentassert-typec"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentassert_typec_proxy"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py312"
line-length = 99
