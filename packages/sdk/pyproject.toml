[project]
name = "agentassert-typec-sdk"
version = "0.4.2"
description = "AgentAssert Type-C SDK wrapper — wrap(Anthropic(), 'contract.yaml') to enforce behavioral contracts on direct API clients."
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
authors = [{ name = "Varun Pratap Bhardwaj" }]
keywords = [
    "ai-agents", "behavioral-contracts", "runtime-enforcement",
    "sdk", "wrapper", "agentassert", "typec", "qualixar",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "agentassert-typec-core>=0.4.2,<0.5",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=6.0",
    "pytest-asyncio>=0.24",
    "anthropic>=0.49",
    "openai>=1.68",
    "ruff>=0.9",
]

[project.urls]
Homepage = "https://agentassert.com/typec"
Paper = "https://arxiv.org/abs/2602.22302"
Repository = "https://github.com/qualixar/agentassert-typec"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentassert_typec_sdk"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py312"
line-length = 99
